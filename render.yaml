services:
  # The Web API (Payment Gateway UI & Endpoints)
  - type: web
    name: payment-gateway-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run server
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true

  # The Telegram Escrow Bot
  - type: worker
    name: escrow-telegram-bot
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run bot
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: TELEGRAM_BOT_TOKEN
        sync: false 
      - key: ALLOWED_TELEGRAM_USER_ID
        sync: false 
